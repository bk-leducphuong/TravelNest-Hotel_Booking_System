version: '3.9'

services:
  mysql:
    image: mysql:8.0
    container_name: travelnest-mysql-test
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '3307:3306'
    volumes:
      - mysql_data_test:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - travelnest-net-test
    env_file:
      - ../.env.development
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u ${DB_USER} -p${DB_PASSWORD}']
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travelnest-redis-test
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data_test:/data
    command: ['redis-server', '--appendonly', 'yes']
    networks:
      - travelnest-net-test
    env_file:
      - ../.env.development
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 30s
      timeout: 10s
      retries: 5

  # redisinsight:
  #   image: redis/redisinsight:latest
  #   container_name: redis-insight
  #   restart: unless-stopped
  #   ports:
  #     - '5540:5540'
  #   volumes:
  #     - redis-insight-data:/data
  #   networks:
  #     - travelnest-net
  #   depends_on:
  #     - redis

  minio:
    image: minio/minio:latest
    container_name: minio-test
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000' # API
      - '9001:9001' # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./minio-data-test:/data
    networks:
      - travelnest-net-test
    env_file:
      - ../.env.development

  mongodb:
    image: mongo:7
    container_name: travelnest-mongodb-test
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-travelnest_analytics}
    volumes:
      - mongodb_data_test:/data/db
    networks:
      - travelnest-net-test
    env_file:
      - ../.env.development
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: travelnest-mongo-express-test
    restart: unless-stopped
    ports:
      - '${MONGO_EXPRESS_PORT:-8081}:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-changeme}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - travelnest-net-test

  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dev
    container_name: travelnest-api-dev
    restart: unless-stopped
    env_file:
      - ../.env.development
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/${MONGODB_DATABASE:-travelnest_analytics}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-travelnest_analytics}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_STREAM: ${NATS_STREAM:-TRAVELNEST_ANALYTICS}
      NATS_CLIENT_NAME: ${NATS_CLIENT_NAME:-travelnest-api}
      ANALYTICS_SERVICE_URL: http://analytics:8081
      MEDIA_SERVICE_URL: http://media:8082
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
      analytics:
        condition: service_healthy
      media:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      - travelnest-net-test

  analytics:
    build:
      context: ../../services/analytics
      dockerfile: Dockerfile
    container_name: travelnest-analytics-dev
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8081
      MONGODB_URI: mongodb://mongodb:27017
      MONGODB_DATABASE: ${MONGODB_DATABASE:-travelnest_analytics}
      REDIS_URL: redis://redis:6379/${REDIS_DB:-1}
      TRENDING_HOTELS_CACHE_TTL: ${TRENDING_HOTELS_CACHE_TTL:-2m}
      TRENDING_DESTINATIONS_CACHE_TTL: ${TRENDING_DESTINATIONS_CACHE_TTL:-5m}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_STREAM: ${NATS_STREAM:-TRAVELNEST_ANALYTICS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    expose:
      - '8081'
    networks:
      - travelnest-net-test
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8081/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  media:
    build:
      context: ../../services/media
      dockerfile: Dockerfile
    container_name: travelnest-media-dev
    restart: unless-stopped
    environment:
      HTTP_ADDR: :8082
      MYSQL_DSN: ${DB_USER}:${DB_PASSWORD}@tcp(mysql:3306)/${DB_NAME}?parseTime=true
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET:-uploads}
      MINIO_USE_SSL: 'false'
      PUBLIC_OBJECT_BASE_URL: ${PUBLIC_OBJECT_BASE_URL:-http://localhost:9000/uploads}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_STREAM: ${MEDIA_NATS_STREAM:-TRAVELNEST_MEDIA}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      MAX_UPLOAD_BYTES: ${MAX_UPLOAD_BYTES:-5242880}
    depends_on:
      mysql:
        condition: service_healthy
      nats:
        condition: service_healthy
      minio:
        condition: service_started
    expose:
      - '8082'
    networks:
      - travelnest-net-test
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8082/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  bullmq-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile.dev
    container_name: travelnest-bullmq-worker-dev
    restart: unless-stopped
    env_file:
      - ../.env.development
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://mongodb:27017/${MONGODB_DATABASE:-travelnest_analytics}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-travelnest_analytics}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_STREAM: ${NATS_STREAM:-TRAVELNEST_ANALYTICS}
      NATS_CLIENT_NAME: ${NATS_CLIENT_NAME:-travelnest-api}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      nats:
        condition: service_healthy
    command: ['npm', 'run', 'dev:bullmq-worker']
    networks:
      - travelnest-net-test

  nats:
    image: nats:2.10-alpine
    container_name: travelnest-nats-test
    restart: unless-stopped
    command: ['-js', '-sd', '/data', '-m', '8222']
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - nats_data_test:/data
    networks:
      - travelnest-net-test
    env_file:
      - ../.env.development
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8222/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  travelnest-net-test:
    driver: bridge

volumes:
  mysql_data_test:
  redis_data_test:
  # redis-insight-data:
  mongodb_data_test:
  nats_data_test:

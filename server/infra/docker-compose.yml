version: '3.9'

services:
  api:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: travelnest-api
    restart: unless-stopped
    env_file:
      - ../.env.production
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/${MONGODB_DATABASE:-travelnest_analytics}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-travelnest_analytics}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_STREAM: ${NATS_STREAM:-TRAVELNEST_ANALYTICS}
      NATS_CLIENT_NAME: ${NATS_CLIENT_NAME:-travelnest-api}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      nats:
        condition: service_healthy
    ports:
      - '3000:3000'
    networks:
      - travelnest-net

  mysql:
    image: mysql:8.0
    container_name: travelnest-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - '3306:3306'
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - travelnest-net
    healthcheck:
      test: ['CMD-SHELL', 'mysqladmin ping -h localhost -u ${DB_USER} -p${DB_PASSWORD}']
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travelnest-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    command: ['redis-server', '--appendonly', 'yes']
    networks:
      - travelnest-net
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping']
      interval: 30s
      timeout: 10s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    container_name: redis-insight
    restart: unless-stopped
    ports:
      - '5540:5540'
    volumes:
      - redis-insight-data:/data
    networks:
      - travelnest-net
    depends_on:
      - redis

  minio:
    image: minio/minio:latest
    container_name: minio
    command: server /data --console-address ":9001"
    ports:
      - '9000:9000' # API
      - '9001:9001' # Web console
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - ./minio-data:/data
    networks:
      - travelnest-net

  mongodb:
    image: mongo:7
    container_name: travelnest-mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_DATABASE: ${MONGODB_DATABASE:-travelnest_analytics}
    volumes:
      - mongodb_data:/data/db
    networks:
      - travelnest-net
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', 'db.adminCommand("ping").ok']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mongo-express:
    image: mongo-express:1.0.2-20
    container_name: travelnest-mongo-express
    restart: unless-stopped
    ports:
      - '${MONGO_EXPRESS_PORT:-8081}:8081'
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USERNAME:-admin}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-changeme}
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - travelnest-net

  bullmq-worker:
    build:
      context: ..
      dockerfile: infra/Dockerfile
    container_name: travelnest-bullmq-worker
    restart: unless-stopped
    env_file:
      - ../.env.development
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/${MONGODB_DATABASE:-travelnest_analytics}
      MONGODB_DATABASE: ${MONGODB_DATABASE:-travelnest_analytics}
      NATS_URL: ${NATS_URL:-nats://nats:4222}
      NATS_STREAM: ${NATS_STREAM:-TRAVELNEST_ANALYTICS}
      NATS_CLIENT_NAME: ${NATS_CLIENT_NAME:-travelnest-api}
    depends_on:
      redis:
        condition: service_healthy
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      nats:
        condition: service_healthy
    command: ['npm', 'run', 'dev:bullmq-worker']
    networks:
      - travelnest-net

  nats:
    image: nats:2.10-alpine
    container_name: travelnest-nats
    restart: unless-stopped
    command: ['-js', '-sd', '/data', '-m', '8222']
    ports:
      - '4222:4222'
      - '8222:8222'
    volumes:
      - nats_data:/data
    networks:
      - travelnest-net
    healthcheck:
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:8222/healthz']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  travelnest-net:
    driver: bridge

volumes:
  mysql_data:
  redis_data:
  redis-insight-data:
  mongodb_data:
  nats_data:

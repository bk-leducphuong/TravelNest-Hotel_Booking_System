name: Backend Image CI

on:
  push:
    branches: [master, develop, staging]
    paths:
      - "server/**"
      - ".github/workflows/backend.yml"
  pull_request:
    branches: [master, develop, staging]
    paths:
      - "server/**"
      - ".github/workflows/backend.yml"
  release:
    types: [published]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/travelnest-api

jobs:
  lint-and-test:
    name: Lint and Test Backend
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [22.x, 24.x]
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check code formatting
        run: npx prettier --check .

      - name: Run unit tests
        run: npm run test:unit
        env:
          NODE_ENV: development
          SESSION_SECRET: test_session_secret_for_ci
          SESSION_SECRET_KEY: test_session_secret_for_ci

      - name: Run integration tests
        run: npm run test:integration
        timeout-minutes: 10
        env:
          NODE_ENV: development
          SESSION_SECRET: test_session_secret_for_ci
          SESSION_SECRET_KEY: test_session_secret_for_ci

      - name: Generate coverage report
        if: matrix.node-version == '24.x'
        run: npm run test:coverage
        timeout-minutes: 10
        env:
          NODE_ENV: development
          SESSION_SECRET: test_session_secret_for_ci
          SESSION_SECRET_KEY: test_session_secret_for_ci

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: matrix.node-version == '24.x'
        with:
          name: backend-coverage
          path: server/coverage/
          retention-days: 7

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: ./server
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  build-and-push:
    name: Build and Push Backend Image
    runs-on: ubuntu-latest
    needs: [lint-and-test]
    if: github.event_name != 'pull_request'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/infra/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Build summary
        run: |
          echo "## Backend image published" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- Image: \`${{ env.IMAGE_NAME }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- GitOps deploy: update the image tag under \`deploy/k8s\`" >> "$GITHUB_STEP_SUMMARY"
